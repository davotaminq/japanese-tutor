<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본어 학습 튜터</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --blue: #1f6feb;
  --purple: #7c3aed;
  --green: #3fb950;
  --amber: #e3b341;
  --red: #f85149;
  --teal: #39c5cf;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 헤더 ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 16px; font-weight: 700; }
.header-sub { font-size: 12px; color: var(--text2); margin-left: auto; }

/* ── 탭 ── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  flex-shrink: 0;
}
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── 컨텐츠 ── */
.content { padding: 16px; max-width: 600px; margin: 0 auto; display: none; }
.content.active { display: block; }

/* ── 카드 공통 ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── 단어 깜빡이 ── */
.flash-card {
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border-radius: 20px;
  padding: 32px 20px 24px;
  text-align: center;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.flash-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,.05);
  border-radius: 50%;
}
.flash-inner {
  background: rgba(255,255,255,.12);
  border-radius: 14px;
  padding: 24px 16px;
  margin-bottom: 14px;
}
.flash-word {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 2.8em;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
}
.flash-reading { font-size: 1.1em; color: rgba(255,255,255,.85); margin-top: 8px; }
.flash-kor {
  background: rgba(0,0,0,.28);
  border-radius: 10px;
  padding: 8px 20px;
  font-size: 1.4em;
  font-weight: 600;
  color: #fff;
  display: inline-block;
  margin-top: 6px;
}
.flash-prog {
  height: 4px;
  background: rgba(255,255,255,.2);
  border-radius: 2px;
  margin-top: 16px;
  overflow: hidden;
}
.flash-bar {
  height: 100%;
  background: rgba(255,255,255,.85);
  border-radius: 2px;
  width: 100%;
  transition: width linear;
}
.flash-counter { color: rgba(255,255,255,.6); font-size: .8em; margin-top: 6px; }
.ctrl-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.btn {
  padding: 10px 8px;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; }
.btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
.speed-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text2);
}
.speed-row select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 12px;
}
.tts-status { font-size: 11px; }

/* ── 학습 카드 ── */
.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.cat-btn {
  padding: 10px 8px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.cat-btn.active {
  background: rgba(31,111,235,.2);
  border-color: var(--blue);
  color: var(--blue);
}
.study-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 20px;
  text-align: center;
  min-height: 180px;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.study-foreign {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 2.4em;
  font-weight: 700;
  color: var(--text);
}
.study-reading { font-size: 1.1em; color: var(--blue); margin-top: 6px; }
.study-answer {
  background: rgba(63,185,80,.1);
  border: 2px solid var(--green);
  border-radius: 12px;
  padding: 12px 20px;
  margin-top: 14px;
  font-size: 1.4em;
  font-weight: 600;
  color: var(--green);
}
.study-hint { font-size: 13px; color: var(--text2); margin-top: 8px; }
.nav-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 6px; }
.counter-text { text-align: center; font-size: 12px; color: var(--text2); margin: 8px 0; }

/* ── 번역기 ── */
.textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  padding: 12px;
  resize: none;
  font-family: 'Noto Sans KR', sans-serif;
  margin-bottom: 10px;
}
.textarea:focus { outline: none; border-color: var(--blue); }
.result-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: 12px;
  padding: 16px;
  margin-top: 12px;
  display: none;
}
.result-main {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 2em;
  font-weight: 700;
  text-align: center;
  margin-bottom: 6px;
}
.result-reading { text-align: center; font-size: 1em; color: var(--blue); margin-bottom: 12px; }
.result-alt { font-size: 12px; color: var(--text2); }

/* ── 배지 ── */
.badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 600;
}
.badge-green { background: rgba(63,185,80,.15); color: var(--green); }
.badge-blue { background: rgba(31,111,235,.15); color: #58a6ff; }
.badge-amber { background: rgba(227,179,65,.15); color: var(--amber); }

/* ── 로딩 ── */
.loading {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}
.loading span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--blue);
  animation: bounce .8s infinite;
}
.loading span:nth-child(2) { animation-delay: .15s; }
.loading span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(.8); opacity: .5; }
  40% { transform: scale(1.2); opacity: 1; }
}

/* ── API 키 ── */
.api-notice {
  background: rgba(227,179,65,.1);
  border: 1px solid rgba(227,179,65,.3);
  border-radius: 10px;
  padding: 12px;
  font-size: 12px;
  color: var(--amber);
  margin-bottom: 12px;
  display: none;
}
.input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.input-text {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 12px;
  font-size: 13px;
}
.input-text:focus { outline: none; border-color: var(--blue); }

/* ── 애니메이션 ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn .3s ease; }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">✈️</span>
  <div>
    <div class="header-title">일본어 학습 튜터</div>
  </div>
  <div class="header-sub" id="apiStatus">API 미설정</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">⚡ 단어 깜빡이</div>
  <div class="tab" onclick="switchTab(1)">📚 학습 카드</div>
  <div class="tab" onclick="switchTab(2)">✏️ 번역기</div>
  <div class="tab" onclick="switchTab(3)">⚙️ 설정</div>
</div>

<!-- ── 탭 0: 단어 깜빡이 ── -->
<div class="content active" id="tab0">
  <div class="flash-card">
    <div class="flash-inner">
      <div class="flash-word fade-in" id="fw">---</div>
      <div class="flash-reading" id="fr"></div>
    </div>
    <div class="flash-kor" id="fk">---</div>
    <div class="flash-prog"><div class="flash-bar" id="fp"></div></div>
    <div class="flash-counter" id="fc">0 / 0</div>
  </div>

  <div class="ctrl-row">
    <button class="btn btn-secondary" onclick="flashPrev()">◀ 이전</button>
    <button class="btn btn-primary" id="playBtn" onclick="flashToggle()">⏸ 정지</button>
    <button class="btn btn-secondary" onclick="flashNext()">다음 ▶</button>
    <button class="btn btn-secondary" id="muteBtn" onclick="flashMute()">🔊 음성</button>
  </div>
  <div class="speed-row">
    <span>간격</span>
    <select id="speedSel" onchange="changeSpeed()">
      <option value="1500">1.5초</option>
      <option value="2000" selected>2초</option>
      <option value="3000">3초</option>
      <option value="4000">4초</option>
    </select>
    <span class="tts-status" id="ttsStatus" style="color:var(--green)">🎵 음성 ON</span>
  </div>

  <div style="margin-top:14px;">
    <div class="card-title">📋 단어 목록 선택</div>
    <div class="ctrl-row">
      <button class="btn btn-secondary" onclick="loadFlash('travel')">🌏 여행</button>
      <button class="btn btn-secondary" onclick="loadFlash('sake')">🍶 사케</button>
      <button class="btn btn-secondary" onclick="loadFlash('business')">💼 비즈니스</button>
      <button class="btn btn-secondary" onclick="loadFlash('jlpt')">🎌 JLPT</button>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="loadAiFlash()">🚀 AI로 새 단어 생성</button>
  </div>
</div>

<!-- ── 탭 1: 학습 카드 ── -->
<div class="content" id="tab1">
  <div class="category-grid" id="catGrid"></div>

  <div class="study-card" id="studyCard">
    <div class="study-foreign" id="sf">카테고리를 선택하세요</div>
    <div class="study-reading" id="sr"></div>
    <div id="sa"></div>
  </div>
  <div class="counter-text" id="studyCounter"></div>

  <div class="nav-row">
    <button class="btn btn-secondary" onclick="studyFirst()">⏮️</button>
    <button class="btn btn-secondary" onclick="studyPrev()">◀</button>
    <button class="btn btn-primary" onclick="studyToggle()" id="studyToggleBtn">👀 정답</button>
    <button class="btn btn-secondary" onclick="studyNext()">▶</button>
    <button class="btn btn-secondary" onclick="studyLast()">⏭️</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
    <button class="btn btn-secondary" onclick="studySpeak()">🔊 발음</button>
    <button class="btn btn-secondary" onclick="studyShuffle()">🔀 섞기</button>
  </div>
</div>

<!-- ── 탭 2: 번역기 ── -->
<div class="content" id="tab2">
  <div class="api-notice" id="apiNotice">
    ⚠️ Gemini API 키를 설정하면 번역 기능을 사용할 수 있습니다. (설정 탭)
  </div>
  <textarea class="textarea" id="korInput" rows="4" placeholder="한국어를 입력하세요&#10;예) 달달한 사케 있나요?"></textarea>
  <button class="btn btn-primary" style="width:100%;" onclick="doTranslate()">🔄 일본어로 번역</button>
  <div class="result-box" id="resultBox">
    <div class="result-main" id="rMain"></div>
    <div class="result-reading" id="rReading"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;">
      <button class="btn btn-secondary" onclick="speakResult()">🔊 발음 듣기</button>
      <button class="btn btn-secondary" onclick="copyResult()">📋 복사</button>
    </div>
    <div class="result-alt" id="rAlt"></div>
  </div>
</div>

<!-- ── 탭 3: 설정 ── -->
<div class="content" id="tab3">
  <div class="card">
    <div class="card-title">🔑 Gemini API 키</div>
    <div class="input-row">
      <input type="password" class="input-text" id="apiKeyInput" placeholder="AIza...">
      <button class="btn btn-primary" onclick="saveApiKey()">저장</button>
    </div>
    <div style="font-size:12px;color:var(--text2);">
      <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--blue)">aistudio.google.com</a>에서 무료 발급<br>

    </div>
  </div>
  <div class="card">
    <div class="card-title">📊 학습 현황</div>
    <div id="statsDiv" style="font-size:13px;line-height:2;color:var(--text2);">
      로딩 중...
    </div>
  </div>
</div>

// ── 상태 ──────────────────────────────────────────
let flashWords = [...WORDS.travel];
let flashIdx = 0;
let flashPlaying = true;
let flashMuted = false;
let flashInterval = 2000;
let flashTimer = null;

let studyCards = [];
let studyIdx = 0;
let showAnswer = false;
let curCat = 'greetings';

let geminiKey = localStorage.getItem('geminiKey') || '';
let translationResult = null;

// ── 탭 전환 ──────────────────────────────────────
function switchTab(n) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
  document.querySelectorAll('.content').forEach((c,i) => c.classList.toggle('active', i===n));
  if (n === 1 && studyCards.length === 0) loadCategory('greetings');
  if (n === 2) updateApiNotice();
  if (n === 3) updateStats();
}

// ── URL 파라미터 처리 ──────────────────────────────
function getParam(key) {
  return new URLSearchParams(window.location.search).get(key) || '';
}
function initFromUrl() {
  const tab = getParam('tab');
  const cat = getParam('category');
  const tabMap = {translate:2, card:1, flash:0, stats:3};
  if (tab && tabMap[tab] !== undefined) switchTab(tabMap[tab]);
  if (cat && CARDS[cat]) { curCat = cat; loadCategory(cat); }
}

// ── 단어 깜빡이 ───────────────────────────────────
function showFlash(idx, animate) {
  const w = flashWords[idx];
  if (!w) return;
  const wEl = document.getElementById('fw');
  if (animate) { wEl.classList.remove('fade-in'); void wEl.offsetWidth; wEl.classList.add('fade-in'); }
  wEl.textContent = w.f;
  document.getElementById('fr').textContent = w.r ? '📖 ' + w.r : '';
  document.getElementById('fk').textContent = w.k ? '🇰🇷 ' + w.k : '';
  document.getElementById('fc').textContent = (idx+1) + ' / ' + flashWords.length;
  const bar = document.getElementById('fp');
  bar.style.transition = 'none'; bar.style.width = '100%';
  setTimeout(() => {
    bar.style.transition = 'width ' + flashInterval + 'ms linear';
    bar.style.width = '0%';
  }, 30);
  if (!flashMuted) speak(w.f, 'ja-JP');
}
function flashNext() { flashIdx = (flashIdx+1) % flashWords.length; showFlash(flashIdx, true); if(flashPlaying) resetTimer(); }
function flashPrev() { flashIdx = (flashIdx-1+flashWords.length) % flashWords.length; showFlash(flashIdx, true); if(flashPlaying) resetTimer(); }
function resetTimer() { clearInterval(flashTimer); if(flashPlaying) flashTimer = setInterval(flashNext, flashInterval); }
function flashToggle() {
  flashPlaying = !flashPlaying;
  document.getElementById('playBtn').textContent = flashPlaying ? '⏸ 정지' : '▶ 재생';
  if (flashPlaying) { showFlash(flashIdx, false); resetTimer(); }
  else { clearInterval(flashTimer); window.speechSynthesis && window.speechSynthesis.cancel(); }
}
function flashMute() {
  flashMuted = !flashMuted;
  document.getElementById('muteBtn').textContent = flashMuted ? '🔇 음성' : '🔊 음성';
  document.getElementById('ttsStatus').textContent = flashMuted ? '🔇 음성 OFF' : '🎵 음성 ON';
  document.getElementById('ttsStatus').style.color = flashMuted ? 'var(--red)' : 'var(--green)';
  if (flashMuted) window.speechSynthesis && window.speechSynthesis.cancel();
}
function changeSpeed() {
  flashInterval = parseInt(document.getElementById('speedSel').value);
  if (flashPlaying) resetTimer();
}
function loadFlash(type) {
  flashWords = [...(WORDS[type] || WORDS.travel)];
  flashIdx = 0;
  showFlash(0, false);
  if (flashPlaying) resetTimer();
}
async function loadAiFlash() {
  if (!geminiKey) { alert('설정 탭에서 Gemini API 키를 먼저 입력하세요.'); switchTab(3); return; }
  const btn = document.querySelector('#tab0 .btn-primary:last-child');
  btn.textContent = '⏳ 생성 중...'; btn.disabled = true;
  try {
    const res = await callGemini('일본어 여행 단어 20개를 생성해주세요.\n형식: 단어 | 한국어 뜻 | 한글발음\n20줄만 출력하세요.');
    const lines = res.trim().split('\n').filter(l => l.includes('|'));
    if (lines.length) {
      flashWords = lines.map(l => {
        const [f,k,r] = l.split('|').map(x=>x.trim());
        return {f,k,r};
      }).filter(w => w.f && w.k);
      flashIdx = 0;
      showFlash(0, false);
      if (flashPlaying) resetTimer();
    }
  } catch(e) { alert('오류: ' + e.message); }
  btn.textContent = '🚀 AI로 새 단어 생성'; btn.disabled = false;
}

// ── 학습 카드 ─────────────────────────────────────
function initCatGrid() {
  const cats = [
    {k:'greetings',n:'👋 기본 인사'},{k:'restaurant',n:'🍽️ 음식점'},
    {k:'sake',n:'🍶 사케'},{k:'omakase',n:'🍣 오마카세'},
    {k:'directions',n:'🧭 길 찾기'},{k:'jlpt',n:'🎌 JLPT'},
  ];
  document.getElementById('catGrid').innerHTML = cats.map(c =>
    `<button class="cat-btn${c.k===curCat?' active':''}" onclick="loadCategory('${c.k}')">${c.n}</button>`
  ).join('');
}
function loadCategory(cat) {
  curCat = cat;
  studyCards = [...(CARDS[cat] || CARDS.greetings)];
  studyIdx = 0; showAnswer = false;
  initCatGrid();
  renderStudy();
}
function renderStudy() {
  if (!studyCards.length) return;
  const c = studyCards[studyIdx];
  document.getElementById('sf').textContent = c.f;
  document.getElementById('sr').textContent = c.r ? '📖 ' + c.r : '';
  document.getElementById('sa').innerHTML = showAnswer
    ? `<div class="study-answer">🇰🇷 ${c.k}</div>`
    : '<div class="study-hint">👆 정답 보기를 누르세요</div>';
  document.getElementById('studyCounter').textContent = (studyIdx+1) + ' / ' + studyCards.length;
  document.getElementById('studyToggleBtn').textContent = showAnswer ? '🔒 숨기기' : '👀 정답';
}
function studyToggle() { showAnswer = !showAnswer; renderStudy(); }
function studyNext() { if(studyIdx<studyCards.length-1) studyIdx++; showAnswer=false; renderStudy(); }
function studyPrev() { if(studyIdx>0) studyIdx--; showAnswer=false; renderStudy(); }
function studyFirst() { studyIdx=0; showAnswer=false; renderStudy(); }
function studyLast() { studyIdx=studyCards.length-1; showAnswer=false; renderStudy(); }
function studyShuffle() { studyCards.sort(()=>Math.random()-.5); studyIdx=0; showAnswer=false; renderStudy(); }
function studySpeak() { if(studyCards[studyIdx]) speak(studyCards[studyIdx].f, 'ja-JP'); }

// ── TTS ───────────────────────────────────────────
function speak(text, lang) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.85; u.pitch = 1.0; u.volume = 1.0;
  function doSpeak() {
    const vs = window.speechSynthesis.getVoices();
    const m = vs.find(v => v.lang.startsWith(lang.split('-')[0]));
    if (m) u.voice = m;
    window.speechSynthesis.speak(u);
  }
  if (window.speechSynthesis.getVoices().length > 0) doSpeak();
  else window.speechSynthesis.onvoiceschanged = doSpeak;
}

// ── 번역기 ────────────────────────────────────────
function updateApiNotice() {
  document.getElementById('apiNotice').style.display = geminiKey ? 'none' : 'block';
}
async function doTranslate() {
  const text = document.getElementById('korInput').value.trim();
  if (!text) { alert('번역할 텍스트를 입력하세요.'); return; }
  if (!geminiKey) { alert('설정 탭에서 API 키를 입력하세요.'); switchTab(3); return; }
  const btn = document.querySelector('#tab2 .btn-primary');
  btn.innerHTML = '<span class="loading"><span></span><span></span><span></span></span>';
  btn.disabled = true;
  try {
    const prompt = `Translate Korean to Japanese.\nRespond ONLY:\nTRANSLATION: [result]\nREADING: [pronunciation in Korean]\nALTERNATIVE: [alternative]\n\nKorean: ${text}`;
    const res = await callGemini(prompt);
    const r = {translation:'',reading:'',alternative:''};
    res.split('\n').forEach(line => {
      if (line.startsWith('TRANSLATION:')) r.translation = line.slice(12).trim();
      else if (line.startsWith('READING:')) r.reading = line.slice(8).trim();
      else if (line.startsWith('ALTERNATIVE:')) r.alternative = line.slice(12).trim();
    });
    translationResult = r;
    document.getElementById('rMain').textContent = r.translation;
    document.getElementById('rReading').textContent = r.reading ? '📖 ' + r.reading : '';
    document.getElementById('rAlt').textContent = r.alternative ? '💡 대안: ' + r.alternative : '';
    document.getElementById('resultBox').style.display = 'block';
  } catch(e) {
    alert('번역 오류: ' + e.message);
  }
  btn.textContent = '🔄 일본어로 번역'; btn.disabled = false;
}
function speakResult() {
  if (translationResult) speak(translationResult.translation, 'ja-JP');
}
function copyResult() {
  if (translationResult) navigator.clipboard.writeText(translationResult.translation);
}

// ── Gemini API ─────────────────────────────────────
async function callGemini(prompt) {
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({contents:[{parts:[{text:prompt}]}]})
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'API 오류');
  }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

// ── 설정 ──────────────────────────────────────────
function saveApiKey() {
  geminiKey = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('geminiKey', geminiKey);
  document.getElementById('apiStatus').textContent = geminiKey ? '✅ API 연결됨' : 'API 미설정';
  document.getElementById('apiStatus').style.color = geminiKey ? 'var(--green)' : 'var(--text2)';
  alert(geminiKey ? '✅ API 키가 저장됐습니다!' : '키가 삭제됐습니다.');
  updateApiNotice();
}
function updateStats() {
  const streak = localStorage.getItem('streak') || 0;
  const total = localStorage.getItem('totalWords') || 0;
  document.getElementById('statsDiv').innerHTML = `
    🔥 연속 학습: <strong>${streak}일째</strong><br>
    📚 누적 단어: <strong>${total}개</strong><br>
    🎌 학습 카테고리: <strong>6종</strong><br>
    💾 데이터: 브라우저 로컬 저장
  `;
}

// ── 초기화 ────────────────────────────────────────
window.onload = () => {
  if (geminiKey) {
    document.getElementById('apiStatus').textContent = '✅ API 연결됨';
    document.getElementById('apiStatus').style.color = 'var(--green)';
    document.getElementById('apiKeyInput').value = geminiKey;
  }
  initCatGrid();
  loadCategory('greetings');
  showFlash(0, false);
  flashTimer = setInterval(flashNext, flashInterval);
  initFromUrl();
};
